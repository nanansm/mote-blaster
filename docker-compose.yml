version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3001/api/v1
      - VITE_WS_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - mote-network

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost:5173
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mote_blaster
      - REDIS_URL=redis://redis:6379
      - WPPCONNECT_BASE_URL=http://wppconnect:21465
      - WPPCONNECT_SECRET_KEY=your_wppconnect_secret_key
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=http://localhost:3001/api/v1/auth/google/callback
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - XENDIT_SECRET_KEY=${XENDIT_SECRET_KEY}
      - XENDIT_WEBHOOK_TOKEN=${XENDIT_WEBHOOK_TOKEN}
      - XENDIT_PRO_PLAN_PRICE=99000
      - XENDIT_PRO_PLAN_NAME=Mote Blaster Pro
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
      - FREE_PLAN_DAILY_LIMIT=50
      - FREE_PLAN_MAX_INSTANCES=1
      - FREE_PLAN_MAX_CAMPAIGNS=2
      - MIN_DELAY_SECONDS=10
    depends_on:
      - db
      - redis
      - wppconnect
    networks:
      - mote-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mote_blaster
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mote-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - mote-network

  wppconnect:
    image: wppconnect/server:latest
    ports:
      - "21465:21465"
    environment:
      - SECRET_KEY=your_wppconnect_secret_key
    volumes:
      - wppdata:/usr/src/wppconnect/userDataDir
    networks:
      - mote-network

networks:
  mote-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  wppdata:
